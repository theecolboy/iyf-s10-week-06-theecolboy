<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="weather-app">
        <header class="app-header">
            <h1>🌤️ Weather Dashboard</h1>
            <p class="subtitle">Built by Stephen Ndungu</p>
        </header>

        <form id="search-form" class="search-form" autocomplete="off">
            <input
                type="text"
                id="city-input"
                placeholder="Enter city name..."
                required
                aria-label="City name"
            >
            <button type="submit">Search</button>
            <button type="button" id="geo-btn" class="secondary" title="Use my location">📍</button>
            <button type="button" id="unit-toggle" class="secondary" title="Toggle °C / °F">°F</button>
        </form>

        <div id="loading" class="hidden status">
            <span class="spinner"></span> Loading...
        </div>

        <div id="error" class="hidden error"></div>

        <section id="weather-display" class="hidden">
            <div class="weather-main">
                <h2 id="city-name"></h2>
                <img id="weather-icon" src="" alt="Weather icon">
                <p id="temperature" class="temperature"></p>
                <p id="description" class="description"></p>
            </div>

            <div class="weather-details">
                <div class="detail">
                    <span class="detail-label">Feels Like</span>
                    <span id="feels-like" class="detail-value"></span>
                </div>
                <div class="detail">
                    <span class="detail-label">Humidity</span>
                    <span id="humidity" class="detail-value"></span>
                </div>
                <div class="detail">
                    <span class="detail-label">Wind</span>
                    <span id="wind" class="detail-value"></span>
                </div>
                <div class="detail">
                    <span class="detail-label">Pressure</span>
                    <span id="pressure" class="detail-value"></span>
                </div>
            </div>
        </section>

        <section id="forecast-section" class="hidden">
            <h3>5-Day Forecast</h3>
            <div id="forecast-container" class="forecast-grid"></div>
        </section>

        <section id="recent-searches">
            <h3>Recent Searches</h3>
            <ul id="search-history"></ul>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
